name: Deploy to Raspberry Pi

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build and Run Docker
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          docker compose up -d --build
